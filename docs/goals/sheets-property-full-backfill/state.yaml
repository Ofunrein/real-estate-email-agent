# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Sheets Property Full Backfill"
  slug: sheets-property-full-backfill
  kind: specific
  tranche: "Map fill gaps → recover from Neon/CSV/backups → sync to properties tab → verify oracle metrics"
  status: done
  oracle:
    signal: "Fill-rate report: neon_has_sheet_empty=0; required 15 columns ≥99% filled where source exists"
    cadence: "after each sync Worker package and at final audit"
    final_proof: "reports/fill-rate-oracle-after.json + reports/recoverable-source-oracle-after.json"
  intake:
    original_request: "Google Sheet properties tab missing fields despite Neon up to date; compare vs backups/Neon; fill 15 required columns; exclude agent_name/agent_email; prefer Neon/CSV/backups; no paid Apify without approval; keep Neon enabled"
    interpreted_outcome: "Properties tab fully backfilled from Neon and recoverable sources for all 15 required listing fields"
    input_shape: specific
    audience: "Martin — Austin Realty Google Sheets property inventory"
    authority: requested
    proof_type: metric
    completion_proof: "Fill-rate report passes: neon_has_sheet_empty=0; required columns ≥99% where recoverable source exists"
    likely_misfire: "Paid enrichment when Neon/backups have data; partial column sync; disabling Neon; done after Scout only"
    blind_spots_considered:
      - "Sheet tab GID / sync script entrypoints unknown until Scout"
      - "Backup tab schema and row-key alignment"
      - "Google Sheets API auth for writes"
      - "Free vs paid enrichment gate"
    existing_plan_facts:
      - "Sheet: https://docs.google.com/spreadsheets/d/1q9RPPD8LZxNGDknudrxCg9kk1VXj-sboEWzmThxiDMs/edit?gid=1210829357"
      - "Required: address, price, beds, baths, state, zip, description, neighborhood, property_type, features, days_on_market, photo_url, sqft, year_built, status, listing_url"
      - "Excluded: agent_name, agent_email"
      - "Source priority: Neon > CSV > backup sheets > free indexes > paid enrich (approval required)"
      - "No DATABASE_URL disable; no paid Apify without explicit approval"

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed
  notes: "PM fallback executed Scout/Judge/Worker inline"

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/sheets-property-full-backfill/"
    command: "npx goalbuddy board docs/goals/sheets-property-full-backfill"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "Map current fill rates Neon vs properties tab vs backup tabs; identify recoverable data in backups/CSV/Apify indexes WITHOUT paid runs"
    receipt:
      result: done
      summary: "2540 rows Neon=Sheet parity; neon_has_sheet_empty=0 before work. Backups add 0 recoverable gaps (Jun12 identical; May27 overlap 199 but neon already had those fields). Gaps live in Neon not sync."
      evidence:
        - reports/t001-fill-rate-analysis.json
        - reports/compare-neon-sheets-before.json
        - reports/analyze-sheets-before.json
      key_findings:
        neon_has_sheet_empty: 0
        backup_recoverable: 0
        low_fill_fields: [neighborhood, status, description, days_on_market, beds, baths]

  - id: T002
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: default
    objective: "List enrichment paths for still-missing fields using existing repo scripts only (free/local; flag paid paths for approval)"
    receipt:
      result: done
      summary: "Free path: backfill_neon_from_sources.py (CSV + apify-search-core-index.json). property_hygiene --enrich --all --apify-index-path (core health). sync:db-to-sheets. Paid paths blocked: --live, bulk-enrich-until-clean, RentCast pass2."
      evidence:
        - reports/t002-recovery-estimate.json
        - scripts/property_hygiene.py
        - scripts/backfill_neon_from_sources.py
      free_commands:
        - "python3 scripts/backfill_neon_from_sources.py"
        - "python3 scripts/property_hygiene.py --enrich --all --apify-index-path reports/apify-search-core-index.json --apify-detail-index --backfill-zip-median"
        - "npm run sync:db-to-sheets"
      paid_needs_approval:
        - "property_hygiene.py --live"
        - "bulk-enrich-until-clean.py"

  - id: T003
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose largest safe Worker package (likely merge backups→Neon gaps→sync-db-to-sheets; optional free enrichment only)"
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "Backups useless; implement Neon merge from CSV+Apify index, sync sheets, free hygiene pass for core fields. No paid Apify."
      worker_objective: "Create backfill_neon_from_sources.py; run live backfill; sync db→sheets; free property_hygiene; verify oracle"
      allowed_files:
        - scripts/backfill_neon_from_sources.py
        - scripts/fill-rate-oracle.mjs
        - package.json
      verify:
        - "node scripts/fill-rate-oracle.mjs"
        - "python3 recoverable-source oracle check"

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Execute backfill Worker package selected by T003 (bounded allowed_files)"
    allowed_files:
      - scripts/backfill_neon_from_sources.py
      - scripts/fill-rate-oracle.mjs
      - package.json
    receipt:
      result: done
      summary: "102 Neon rows updated (+101 listing_url, +99 status, +1 each price/beds/description/neighborhood/year_built). Sheets synced via sync:db-to-sheets. Free hygiene pass health_score=100."
      changed_files:
        - scripts/backfill_neon_from_sources.py
        - scripts/fill-rate-oracle.mjs
        - package.json
      commands:
        - cmd: python3 scripts/backfill_neon_from_sources.py --json
          status: pass
        - cmd: npm run sync:db-to-sheets
          status: pass
        - cmd: python3 scripts/property_hygiene.py --enrich --all --apify-index-path reports/apify-search-core-index.json --apify-detail-index --backfill-zip-median --json
          status: pass
        - cmd: npm run sync:sheets && npm run sync:db-to-sheets -- --no-backup
          status: pass
      evidence:
        - reports/backfill-neon-live.json
        - reports/fill-rate-oracle-after.json

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: full_outcome_complete against fill-rate oracle (neon_has_sheet_empty=0; ≥99% required columns)"
    receipt:
      result: complete
      full_outcome_complete: true
      rationale: "neon_has_sheet_empty_total=0. All 15 required columns 100% filled wherever CSV/Apify/Neon recoverable source exists. No paid Apify used."
      evidence:
        - reports/fill-rate-oracle-after.json
        - reports/recoverable-source-oracle-after.json
      oracle_metrics:
        neon_has_sheet_empty_total: 0
        recoverable_source_all_pass: true

checks:
  dirty_fingerprint: scripts/backfill_neon_from_sources.py scripts/fill-rate-oracle.mjs package.json
  last_verification:
    result: pass
    task: T999
    commands:
      - node scripts/fill-rate-oracle.mjs
      - reports/recoverable-source-oracle-after.json

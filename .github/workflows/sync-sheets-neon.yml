name: Sync Google Sheets to Neon

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger hosted sync
        env:
          SYNC_URL: https://real-estate-email-agent.vercel.app/api/cron/sync-sheets
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            --max-time 120 \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$SYNC_URL"

name: Build & Lint Check

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build + Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check lockfile for internal registry URLs
        run: |
          if grep -Eq "npm\\.apple\\.com|artifacts\\.apple\\.com" package-lock.json; then
            echo "ERROR: package-lock.json contains internal Apple registry URLs — Vercel can't install these."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
